query GetComics($page: Int, $limit: Int, $search: String, $publisher: String, $series: String) {
  comics(page: $page, limit: $limit, search: $search, publisher: $publisher, series: $series) {
    comics {
      id
      inferredMetadata {
        issue {
          name
          number
          year
          subtitle
        }
      }
      rawFileDetails {
        name
        extension
        archive {
          uncompressed
        }
      }
      sourcedMetadata {
        comicvine
        comicInfo
        locg {
          name
          publisher
          cover
        }
      }
      canonicalMetadata {
        title {
          value
        }
        series {
          value
        }
        issueNumber {
          value
        }
      }
    }
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      currentPage
      totalPages
    }
  }
}

query GetRecentComics($limit: Int) {
  comics(page: 1, limit: $limit) {
    comics {
      id
      inferredMetadata {
        issue {
          name
          number
          year
          subtitle
        }
      }
      rawFileDetails {
        name
        extension
        cover {
          filePath
        }
        archive {
          uncompressed
        }
      }
      sourcedMetadata {
        comicvine
        comicInfo
        locg {
          name
          publisher
          cover
        }
      }
      canonicalMetadata {
        title {
          value
        }
        series {
          value
        }
        issueNumber {
          value
        }
