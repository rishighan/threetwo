fragment ProvenanceFull on Provenance {
  source
  sourceId
  confidence
  fetchedAt
  url
}

fragment MetadataFieldFull on MetadataField {
  value
  provenance { ...ProvenanceFull }
  userOverride
}

query GetComicById($id: ID!) {
  comic(id: $id) {
    id

    # Inferred metadata
    inferredMetadata {
      issue {
        name
        number
        year
        subtitle
      }
    }

    # Canonical metadata
    canonicalMetadata {
      # ── Identity ──────────────────────────────────────────────────────────
      title { ...MetadataFieldFull }
      series { ...MetadataFieldFull }
      volume { ...MetadataFieldFull }
      issueNumber { ...MetadataFieldFull }
      collectionTitle { ...MetadataFieldFull }

      # ── Series ────────────────────────────────────────────────────────────
      seriesInfo {
        issueCount
        startYear
        volumeCount
        sortName
        language
        alternativeNames { ...MetadataFieldFull }
        provenance { ...ProvenanceFull }
      }

      # ── Publication ───────────────────────────────────────────────────────
      publisher { ...MetadataFieldFull }
      imprint { ...MetadataFieldFull }
      coverDate { ...MetadataFieldFull }
      storeDate { ...MetadataFieldFull }
      publicationDate { ...MetadataFieldFull }
      language { ...MetadataFieldFull }

      # ── Content ───────────────────────────────────────────────────────────
      description { ...MetadataFieldFull }
      notes { ...MetadataFieldFull }
      stories { ...MetadataFieldFull }
      storyArcs {
        name
        number
        id
        provenance { ...ProvenanceFull }
      }
      characters { ...MetadataFieldFull }
      teams { ...MetadataFieldFull }
      locations { ...MetadataFieldFull }
      universes {
        name
        designation
        id
        provenance { ...ProvenanceFull }
      }
      coverImage { ...MetadataFieldFull }

      # ── Credits ───────────────────────────────────────────────────────────
      creators {
        name
        role
        provenance { ...ProvenanceFull }
      }

      # ── Classification ────────────────────────────────────────────────────
      genres { ...MetadataFieldFull }
      tags { ...MetadataFieldFull }
      ageRating { ...MetadataFieldFull }

      # ── Physical ──────────────────────────────────────────────────────────
      pageCount { ...MetadataFieldFull }
      format { ...MetadataFieldFull }

      # ── Commercial ────────────────────────────────────────────────────────
      prices {
        amount
        currency
        country
        provenance { ...ProvenanceFull }
      }
      gtin {
        isbn
        upc
        userOverride
        provenance { ...ProvenanceFull }
      }
      reprints {
        description
        id
        provenance { ...ProvenanceFull }
      }
      communityRating { ...MetadataFieldFull }

      # ── External ──────────────────────────────────────────────────────────
      externalIDs {
        source
        externalId
        primary
        provenance { ...ProvenanceFull }
      }
      urls {
        url
        primary
        provenance { ...ProvenanceFull }
      }
    }

    # Sourced metadata
    sourcedMetadata {
      comicInfo
      comicvine
      metron
      gcd
      locg {
        name
        publisher
        url
        cover
        description
        price
        rating
        pulls
        potw
      }
    }

    # Raw file details
    rawFileDetails {
      name
      filePath
      fileSize
      extension
      mimeType
      containedIn
      pageCount
      archive {
        uncompressed
        expandedPath
      }
      cover {
        filePath
        stats
      }
    }

    # Import status
    importStatus {
      isImported
      tagged
      matchedResult {
        score
      }
    }

    # Timestamps
    createdAt
    updatedAt
  }
}
